<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarktView | Email Confirmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030508;
            --card-bg: rgba(10, 14, 23, 0.4);
            --primary-glow: #00d27a;
            --primary-glow-dim: rgba(0, 210, 122, 0.15);
            --secondary-glow: #0088cc;
            --text-main: #f0f4f8;
            --text-muted: #8b949e;
            --red-candle: #ff2a55;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- Parallax Background & Grid --- */
        .background-container {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            z-index: 0;
            pointer-events: none;
        }

        .grid-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            -webkit-mask-image: radial-gradient(circle at 50% 50%, black 10%, transparent 80%);
            mask-image: radial-gradient(circle at 50% 50%, black 10%, transparent 80%);
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
        }

        /* Ambient Glow Orbs */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
        }
        
        .glow-1 {
            top: 20%;
            left: 30%;
            width: 300px;
            height: 300px;
            background: var(--primary-glow);
            animation: float 8s ease-in-out infinite;
        }

        .glow-2 {
            bottom: 20%;
            right: 20%;
            width: 400px;
            height: 400px;
            background: var(--secondary-glow);
            animation: float 10s ease-in-out infinite reverse;
        }

        /* Floating Candlesticks */
        .candle {
            position: absolute;
            width: 4px;
            border-radius: 2px;
            opacity: 0.1;
            transition: transform 0.2s ease-out;
        }
        .candle::before {
            content: '';
            position: absolute;
            width: 1px;
            height: 150%;
            top: -25%;
            left: 50%;
            transform: translateX(-50%);
            background: inherit;
        }

        /* --- Main Card Content --- */
        .card-container {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            padding: 3.5rem 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-top: 1px solid rgba(0, 210, 122, 0.3);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8), 
                        0 0 40px var(--primary-glow-dim);
            text-align: center;
            max-width: 460px;
            width: 90%;
            transform: translateY(30px);
            opacity: 0;
            animation: cardEntrance 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: hidden;
        }

        /* Shine effect over the card */
        .card-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            animation: shine 4s infinite 2s;
        }

        @keyframes cardEntrance {
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        /* --- Animated SVG Icon --- */
        .icon-container {
            margin: 0 auto 1.5rem;
            width: 120px;
            height: 120px;
            position: relative;
        }

        .chart-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .chart-line {
            fill: none;
            stroke: var(--primary-glow);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: drawLine 1.5s ease-out 0.5s forwards;
            filter: drop-shadow(0 0 6px var(--primary-glow-dim));
        }

        .check-mark {
            fill: none;
            stroke: var(--primary-glow);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.6s ease-out 2s forwards;
            filter: drop-shadow(0 0 8px var(--primary-glow-dim));
        }

        .chart-node {
            fill: var(--bg-color);
            stroke: var(--primary-glow);
            stroke-width: 2;
            opacity: 0;
            animation: fadeInNode 0.3s ease-out forwards;
        }

        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }
        @keyframes fadeInNode { to { opacity: 1; } }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* --- Typography --- */
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #ffffff 0%, #a0a5b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .app-name {
            color: var(--primary-glow);
            -webkit-text-fill-color: var(--primary-glow);
            text-shadow: 0 0 20px var(--primary-glow-dim);
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* --- Big CTA Button --- */
        .btn-glow {
            display: inline-block;
            width: 100%;
            padding: 1rem 2rem;
            background: transparent;
            color: var(--primary-glow);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid var(--primary-glow);
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 15px var(--primary-glow-dim) inset,
                        0 0 20px var(--primary-glow-dim);
            overflow: hidden;
            z-index: 1;
        }

        .btn-glow::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-glow);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
        }

        .btn-glow:hover {
            color: #030508;
            box-shadow: 0 10px 30px rgba(0, 210, 122, 0.3), 0 0 40px rgba(0, 210, 122, 0.2);
            border-color: transparent;
        }

        .btn-glow:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .btn-glow:active {
            transform: translateY(2px);
        }

        /* Data ticker decorative bar */
        .ticker-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-glow), var(--secondary-glow), transparent);
            background-size: 200% 100%;
            animation: gradientMove 3s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card-container {
                padding: 2.5rem 1.5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- Dynamic Parallax Background -->
    <div class="background-container" id="bg-container">
        <div class="grid-layer" id="grid"></div>
        <div class="glow-orb glow-1" id="orb1"></div>
        <div class="glow-orb glow-2" id="orb2"></div>
        <!-- Candlesticks injected via JS -->
        <div id="candles-container"></div>
    </div>

    <!-- Main Content -->
    <div class="card-container">
        <!-- SVG Bullish Chart + Checkmark Animation -->
        <div class="icon-container">
            <svg class="chart-svg" viewBox="0 0 100 100">
                <!-- Grid lines -->
                <line x1="10" y1="25" x2="90" y2="25" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                <line x1="10" y1="50" x2="90" y2="50" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                <line x1="10" y1="75" x2="90" y2="75" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
                
                <!-- Bullish Trend Line -->
                <path class="chart-line" d="M 10 80 L 30 60 L 45 65 L 65 35 L 85 15" />
                
                <!-- Nodes along the chart -->
                <circle class="chart-node" cx="10" cy="80" r="3" style="animation-delay: 0.5s;" />
                <circle class="chart-node" cx="30" cy="60" r="3" style="animation-delay: 0.8s;" />
                <circle class="chart-node" cx="45" cy="65" r="3" style="animation-delay: 1.1s;" />
                <circle class="chart-node" cx="65" cy="35" r="3" style="animation-delay: 1.4s;" />
                
                <!-- Final Big Node & Checkmark -->
                <circle class="chart-node" cx="85" cy="15" r="14" style="animation-delay: 1.8s; fill: rgba(0, 255, 157, 0.1); stroke-width: 2;" />
                <path class="check-mark" d="M 78 15 L 83 20 L 92 9" />
            </svg>
        </div>

        <h1>Welcome to <span class="app-name">MarktView</span></h1>
        <p>Your email has been successfully verified. The markets are open, and your dashboard is ready for action. Let's start tracking.</p>
        
        <a href="https://marktview.up.railway.app" class="btn-glow">
            Access Dashboard
        </a>

        <div class="ticker-bar"></div>
    </div>

    <script>
        // --- Parallax Effect ---
        const bgContainer = document.getElementById('bg-container');
        const grid = document.getElementById('grid');
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            // Shift elements inversely to mouse movement for depth
            const moveX = (x - 0.5) * 40; 
            const moveY = (y - 0.5) * 40;

            grid.style.transform = `perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px) translate(${-moveX * 0.5}px, ${-moveY * 0.5}px)`;
            orb1.style.transform = `translate(${moveX}px, ${moveY}px)`;
            orb2.style.transform = `translate(${-moveX * 1.5}px, ${-moveY * 1.5}px)`;
            
            // Move candles
            document.querySelectorAll('.candle').forEach((candle) => {
                const speed = parseFloat(candle.getAttribute('data-speed'));
                candle.style.transform = `translate(${moveX * speed}px, ${moveY * speed}px)`;
            });
        });

        // --- Generate Floating Candlesticks ---
        const candlesContainer = document.getElementById('candles-container');
        const colors = ['var(--primary-glow)', 'var(--red-candle)'];
        const numCandles = 25;

        for (let i = 0; i < numCandles; i++) {
            const candle = document.createElement('div');
            candle.classList.add('candle');
            
            // Random properties
            const left = Math.random() * 100;
            const top = Math.random() * 100;
            const height = 15 + Math.random() * 40;
            const color = colors[Math.floor(Math.random() * colors.length)];
            const speed = 0.3 + Math.random() * 1.5;
            const opacity = 0.05 + Math.random() * 0.1;

            // Apply styles
            candle.style.left = `${left}%`;
            candle.style.top = `${top}%`;
            candle.style.height = `${height}px`;
            candle.style.backgroundColor = color;
            candle.style.opacity = opacity;
            candle.setAttribute('data-speed', speed);

            // Add subtle floating animation delay
            candle.style.animation = `float ${5 + Math.random() * 5}s ease-in-out infinite`;
            candle.style.animationDelay = `${Math.random() * 5}s`;

            candlesContainer.appendChild(candle);
        }
    </script>
</body>
</html>
